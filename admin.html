<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Administrativo - Barbearia</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-900 antialiased min-h-screen">

  <header class="bg-white border-b border-gray-200 sticky top-0 z-10">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-black text-white rounded-full flex items-center justify-center font-bold">
          RS
        </div>
        <div>
          <h1 class="text-xl font-bold text-gray-950">Painel do Barbeiro</h1>
          <p class="text-xs text-gray-500">Controle de Agendamentos</p>
        </div>
      </div>
      <button onclick="window.location.reload()" class="flex items-center gap-2 bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2 rounded-lg text-sm font-medium transition">
        <i data-lucide="refresh-cw" class="w-4 h-4"></i> Atualizar
      </button>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-8">
    
    <div class="mb-6 bg-white p-4 rounded-xl border border-gray-200 flex items-center gap-4 max-w-xs shadow-sm">
      <div class="w-12 h-12 bg-amber-50 text-amber-600 rounded-lg flex items-center justify-center">
        <i data-lucide="calendar" class="w-6 h-6"></i>
      </div>
      <div>
        <p class="text-sm text-gray-500 font-medium">Total Agendado</p>
        <span id="contador-agendamentos" class="text-2xl font-bold text-gray-950">0</span>
      </div>
    </div>

    <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
      <div class="p-5 border-b border-gray-100 bg-gray-50/50">
        <h2 class="font-bold text-gray-950 flex items-center gap-2">
          <i data-lucide="list-ordered" class="w-5 h-5 text-gray-500"></i> Próximos Atendimentos
        </h2>
      </div>

      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="border-b border-gray-200 text-xs font-semibold uppercase tracking-wider text-gray-500 bg-gray-50">
              <th class="p-4">Cliente</th>
              <th class="p-4">Data e Horário</th>
              <th class="p-4">Endereço</th>
              <th class="p-4">Serviços Selecionados</th>
              <th class="p-4">Valor Total</th>
              <th class="p-4 text-right">Ações</th>
            </tr>
          </thead>
          <tbody id="lista-agendamentos-admin" class="divide-y divide-gray-200 text-sm">
            <tr id="linha-carregando">
              <td colspan="6" class="p-8 text-center text-gray-500">
                <div class="flex items-center justify-center gap-2">
                  <span class="animate-spin rounded-full h-4 w-4 border-b-2 border-black"></span>
                  Carregando agendamentos...
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AiZySyCglNITpBMsiPQyOHRKJ8K10dNoQquxoHE",
      authDomain: "projeto-barbeiro-c6fe3.firebaseapp.com",
      projectId: "projeto-barbeiro-c6fe3",
      storageBucket: "projeto-barbeiro-c6fe3.firebasestorage.app",
      messagingSenderId: "251548886552",
      appId: "1:251548886552:web:b2cf3992344300a2e0c56d"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function carregarAgendamentosAdmin() {
      const tabelaCorpo = document.getElementById('lista-agendamentos-admin');
      const contadorEl = document.getElementById('contador-agendamentos');

      db.collection("agendamentos")
      .where("status", "==", "pendente") // <-- ADICIONADO AQUI!
      .orderBy("data", "asc")
      .orderBy("horarioInicio", "asc")
      .onSnapshot((querySnapshot) => {
        tabelaCorpo.innerHTML = "";
          
          if (querySnapshot.empty) {
            tabelaCorpo.innerHTML = `
              <tr>
                <td colspan="6" class="p-8 text-center text-gray-500">Nenhum agendamento encontrado no banco de dados.</td>
              </tr>`;
            contadorEl.innerText = "0";
            return;
          }

          contadorEl.innerText = querySnapshot.size;

          querySnapshot.forEach((doc) => {
            const dados = doc.data();
            const idDocumento = doc.id;

            // Formatar data para padrão brasileiro
            let dataFormatada = dados.data;
            if(dados.data) {
              const partes = dados.data.split('-');
              if(partes.length === 3) dataFormatada = `${partes[2]}/${partes[1]}/${partes[0]}`;
            }

            // Formatar lista de serviços amigável (Separa por vírgulas)
            let listaServicos = "Não informado";
            if (dados.servicos && Array.isArray(dados.servicos)) {
              listaServicos = dados.servicos.join(", ");
            }

            // Formatar valor em R$
            let valorFormatado = "R$ 0,00";
            if (dados.valorTotal !== undefined) {
              valorFormatado = `R$ ${parseFloat(dados.valorTotal).toFixed(2).replace('.', ',')}`;
            }
            
// Pega o telefone limpo salvo no banco, ou adiciona um fallback genérico
        const foneCliente = dados.telefone ? dados.telefone : "";
        const textoBarbeiro = encodeURIComponent(`Coe ${dados.nome}! Podemos confirmar o seu agendamento no dia ${dataFormatada} às ${dados.horarioInicio}?.`);
        
        // Link direto para o número do cliente!
        const linkWhatsBarbeiro = `https://api.whatsapp.com/send?phone=55${foneCliente}&text=${textoBarbeiro}`;

        const tr = document.createElement('tr');
        tr.className = "hover:bg-gray-50 transition";
        tr.innerHTML = `
          <td class="p-4">
            <div class="font-bold text-gray-900">${dados.nome || 'Não informado'}</div>
          </td>
          <td class="p-4">
            <div class="flex flex-col">
              <span class="font-medium text-gray-950">${dados.horarioInicio || '00:00'}</span>
              <span class="text-xs text-gray-500">${dataFormatada}</span>
            </div>
          </td>
          <td class="p-4 text-gray-600 max-w-xs truncate">
            <div class="flex items-center gap-2">
              <!-- Guardamos o endereço com uma ID dinâmica -->
              <span id="end-${idDocumento}">${dados.endereco || 'Não informado'}</span>
              
              <!-- Botão invisível por padrão, aparece ao passar o mouse (hover) -->
              <button onclick="copiarEndereco('${idDocumento}')" class="text-gray-400 hover:text-gray-700 p-1 rounded transition flex-shrink-0" title="Copiar endereço completo">
                <i data-lucide="copy" class="w-3.5 h-3.5"></i>
              </button>
            </div>
          </td>
          <td class="p-4 text-gray-700 font-medium">
            <span class="bg-gray-100 text-gray-800 px-2 py-1 rounded text-xs">${listaServicos}</span>
          </td>
          <td class="p-4 font-bold text-emerald-600">
            ${valorFormatado}
          </td>
          <td class="p-4 text-right">
            <div class="flex items-center justify-end gap-2">
              <a href="${linkWhatsBarbeiro}" target="_blank" class="bg-emerald-50 hover:bg-emerald-100 text-emerald-600 p-2 rounded-lg border border-emerald-200 transition flex items-center justify-center" title="Chamar Cliente no WhatsApp">
                <i data-lucide="message-circle" class="w-4 h-4"></i>
              </a>

            <button onclick="concluirAgendamento('${idDocumento}')" class="bg-emerald-50 hover:bg-emerald-100 text-emerald-600 px-3 py-1.5 rounded-lg text-xs font-semibold border border-emerald-200 transition">
              Concluir Atendimento
            </button>
            </div>
          </td>
        `;
        tabelaCorpo.appendChild(tr);
          });

          lucide.createIcons();
        }, (error) => {
          console.error("Erro ao escutar agendamentos: ", error);
          tabelaCorpo.innerHTML = `<tr><td colspan="6" class="p-4 text-center text-red-500">Erro ao carregar dados. Verifique o console.</td></tr>`;
        });
    }

function copiarEndereco(idDocumento) {
  const elementoEndereco = document.getElementById(`end-${idDocumento}`);
  if (!elementoEndereco) return;

  const textoEndereco = elementoEndereco.innerText;

  // Método moderno (computador e navegadores atuais)
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(textoEndereco)
      .then(() => alert("Endereço copiado!"))
      .catch(err => copiarComoFallback(textoEndereco));
  } else {
    // Método de fallback (infalível para celulares mais antigos ou restrições do Safari)
    copiarComoFallback(textoEndereco);
  }
}

// Função auxiliar para garantir a cópia no ambiente mobile
function copiarComoFallback(texto) {
  const textArea = document.createElement("textarea");
  textArea.value = texto;
  
  // Evita rolar a tela do celular
  textArea.style.top = "0";
  textArea.style.left = "0";
  textArea.style.position = "fixed";
  
  document.body.appendChild(textArea);
  textArea.focus();
  textArea.select();
  textArea.setSelectionRange(0, 99999); // Para iOS

  try {
    document.execCommand('copy');
    alert("Endereço copiado!");
  } catch (err) {
    console.error("Não foi possível copiar", err);
  }

  document.body.removeChild(textArea);
}

function concluirAgendamento(idDocumento) {
  // Atualiza o documento no Firebase em vez de deletar
  db.collection("agendamentos").doc(idDocumento).update({
    status: "concluido"
  })
  .then(() => {
    console.log("Agendamento concluído com sucesso!");
    // Não precisa atualizar a tela manualmente, o onSnapshot faz isso sozinho!
  })
  .catch((error) => {
    console.error("Erro ao concluir agendamento: ", error);
    alert("Erro ao atualizar o status do atendimento.");
  });
}

    window.onload = () => {
      carregarAgendamentosAdmin();
      lucide.createIcons();
    };
  </script>
</body>
</html>
